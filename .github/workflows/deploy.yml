name: Deploy NestJS Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: SSH and Deploy to Lightsail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            # ১. Node.js এবং pnpm এনভায়রনমেন্ট শুরুতেই সচল করা
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # ২. ব্যাকএন্ড প্রোজেক্ট ফোল্ডারে প্রবেশ
            cd ~/louisianaroma-backend

            # ৩. গিট থেকে লেটেস্ট কোড নিয়ে আসা
            git fetch origin main
            git reset --hard origin/main
            git pull origin main

            # ৪. ডিপেনডেন্সি ইনস্টল করা (লকফাইল এরর এড়াতে নরমাল ইনস্টল)
            pnpm install

            # ৫. প্রিজমা ক্লায়েন্ট জেনারেট করা
            echo "Generating Prisma Client..."
            pnpm prisma generate

            # ৬. প্রজেক্ট বিল্ড করা
            pnpm build

            # ৭. PM2 প্রসেস (louisiana-api) রিস্টার্ট করা
            if pm2 describe louisiana-api > /dev/null 2>&1; then
              echo "Restarting existing PM2 process: louisiana-api"
              pm2 restart louisiana-api --update-env
            else
              echo "Starting new PM2 process..."
              pm2 start dist/main.js --name "louisiana-api"
            fi

            # ৮. কনফিগারেশন সেভ রাখা
            pm2 save