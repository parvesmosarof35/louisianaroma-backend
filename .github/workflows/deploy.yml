name: Deploy NestJS Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: SSH and Deploy to Lightsail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            # ১. আপনার সঠিক প্রোজেক্ট ফোল্ডারে প্রবেশ
            cd ~/louisianaroma-backend

            # ২. গিট থেকে লেটেস্ট কোড নিয়ে আসা
            git reset --hard origin/main
            git pull origin/main

            # ৩. Node.js এবং pnpm এনভায়রনমেন্ট সচল করা
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # ৪. ডিপেনডেন্সি ইনস্টল, প্রিজমা জেনারেট এবং বিল্ড করা
            pnpm install --frozen-lockfile
            pnpm prisma generate
            pnpm build

            # ৫. PM2 প্রসেস রিস্টার্ট (PM2-তে আপনার প্রসেসের নাম 'backend' ধরে নেওয়া হয়েছে, প্রয়োজনে পরিবর্তন করুন)
            pm2 describe backend > /dev/null 2>&1
            if [ $? -ne 0 ]; then
              pm2 start dist/main.js --name "backend"
            else
              pm2 restart backend --update-env
            fi

            # ৬. কনফিগারেশন সেভ
            pm2 save
