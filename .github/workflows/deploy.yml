name: Deploy NestJS Backend (Dockerized)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: SSH and Deploy via Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            # ১. ব্যাকএন্ড প্রোজেক্ট ফোল্ডারে প্রবেশ
            cd /home/ubuntu/louisianaroma-backend || exit 1

            # ২. গিট থেকে লেটেস্ট কোড নিয়ে আসা
            echo "Fetching and pulling latest code..."
            git fetch --all
            git reset --hard origin/main

            # ৩. সার্ভারে যদি অলরেডি কোনো .env ফাইল থাকে তা ডকার কন্টেইনারে পাস করার প্রস্তুতি
            # (ডকার বিল্ড ও রান করার কমান্ড)
            echo "Building new Docker image..."
            docker build -t louisiana-api-image .

            # ৪. পুরাতন কন্টেইনার যদি সচল থাকে, তবে তা বন্ধ ও রিমুভ করা (যাতে পোর্ট খালি হয়)
            echo "Stopping old container if exists..."
            docker stop louisiana-api-container || true
            docker rm louisiana-api-container || true

            # ৫. নতুন ডকার কন্টেইনার রান করা (পোর্ট ৫০০৩ বা আপনার পছন্দমতো সেট করতে পারেন)
            # এখানে আপনার অ্যাপের রিয়েল পোর্ট অনুযায়ী ম্যাপ করবেন (যেমন: -p <সার্ভার_পোর্ট>:<ডকার_এক্সপোজ_পোর্ট>)
            echo "Starting new Docker container..."
            docker run -d \
              --name louisiana-api-container \
              -p 5000:5000 \
              --restart always \
              --env-file .env \
              louisiana-api-image

            # ৬. অব্যবহৃত পুরাতন ডকার ইমেজ ক্লিন করা (যাতে সার্ভারের স্টোরেজ ফুল না হয়)
            echo "Cleaning up unused Docker images..."
            docker image prune -f

            echo "Backend Docker Deployment completed successfully!"